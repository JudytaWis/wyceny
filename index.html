      page-break-inside: avoid;

  @media print {

  .replace(/^-+|-+$/g, '')

};

/* ============================================================
   URL ROUTING (?quote=slug)
   ============================================================ */
const getQuoteFromURL = () => {
  const params = new URLSearchParams(window.location.search);
  return params.get('quote');
};
const setQuoteInURL = (slug) => {
  const u = new URL(window.location.href);
  if (slug) u.searchParams.set('quote', slug);
  else u.searchParams.delete('quote');
  window.history.replaceState({}, '', u);
};

/* ============================================================
   EDITABLE TEXT — inline contenteditable wrapper
   ============================================================ */
const EditableText = ({ value, onChange, placeholder = '', className = '', as: As = 'span', multiline = false, style }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && ref.current.innerText !== (value || '')) {
      ref.current.innerText = value || '';
    }
  }, [value]);
  return (
    <As
      ref={ref}
      contentEditable
      suppressContentEditableWarning
      data-placeholder={placeholder}
      onBlur={(e) => onChange(e.currentTarget.innerText)}
      onKeyDown={(e) => {
        if (!multiline && e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); }
      }}
      className={className}
      style={style}
    >
      {value || ''}
    </As>
  );
};

/* Number helpers — SE format: "1 234,56" */
const parseNum = (v) => {
  if (v == null || v === '') return null;
  const s = String(v).replace(/\s/g, '').replace(/ /g, '').replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
};
const formatNum = (n, decimals = 2) => {
  if (n == null || isNaN(n)) return '';
  return n.toLocaleString('sv-SE', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).replace(/ /g, ' ');
};
/* Build a formula string from legacy hours/discount/rate fields */
const buildFormulaFromLegacy = (r) => {
  const h = (r.hours || '').toString().trim();
  const d = (r.discount || '').toString().trim();
  const rate = (r.rate || '').toString().trim();
  if (!h && !rate) return '';
  if (d && d !== '0') return `(${h} - ${d}) h × ${rate} kr`;
  return `${h} h × ${rate} kr`;
};

/* Try to parse a formula string and return numeric total. Returns null if no pattern matches. */
const computeFromFormula = (s) => {
  if (!s || typeof s !== 'string') return null;
  // Pattern A: (a - b) * c  or  (a - b) × c
  let m = s.match(/\(\s*([\d\s.,]+?)\s*[-−]\s*([\d\s.,]+?)\s*\)\s*[a-zA-Z]*\s*[*×x·]\s*([\d\s.,]+)/);
  if (m) {
    const a = parseNum(m[1]); const b = parseNum(m[2]) || 0; const c = parseNum(m[3]);
    if (a != null && c != null) return (a - b) * c;
  }
  // Pattern B: a * b (single multiplication)
  m = s.match(/([\d\s.,]+?)\s*[a-zA-Z]*\s*[*×x·]\s*([\d\s.,]+)/);
  if (m) {
    const a = parseNum(m[1]); const b = parseNum(m[2]);
    if (a != null && b != null) return a * b;
  }
  return null;
};

const computeRowTotal = (r) => computeFromFormula(r.formula);

/* Returns array of rows for a manpower block (handles legacy schemas) */
const manpowerRows = (b) => {
  if (Array.isArray(b.rows) && b.rows.length > 0) {
    return b.rows.map(r => {
      if (r.formula != null) return r;
      // Per-row legacy hours/discount/rate -> formula
      return { ...r, formula: buildFormulaFromLegacy(r) };
    });
  }
  // Block-level legacy (no rows array, fields on the block itself)
  return [{
    id: 'legacy',
    label: b.label || '',
    formula: buildFormulaFromLegacy(b),
    total: b.total || '',
    auto: b.auto !== false,
  }];
};
const computeManpowerTotal = (b) => {
  return manpowerRows(b).reduce((s, r) => {
    if (r.auto !== false) {
      const t = computeRowTotal(r);
      return s + (t || 0);
    }
    const t = parseNum(r.total) || 0;
    return s + t;
  }, 0);
};

/* ---- SUBSECTION (Labour/Material/etc. — has nested children blocks) ---- */
const SubsectionBlock = ({ block, set, onDelete, onMove }) => {
  const colors = { blue: '#5498D9', green: '#22C55E', gold: '#A49251', purple: '#6366F1' };
  const dot = colors[block.color] || '#5498D9';
  const children = block.children || [];

  const updateChild = (id, nb) => set({ children: children.map(b => b.id === id ? nb : b) });
  const deleteChild = (id) => set({ children: children.filter(b => b.id !== id) });
  const moveChild = (id, dir) => {
    const i = children.findIndex(b => b.id === id);
    const j = i + dir;
    if (j < 0 || j >= children.length) return;
    const arr = [...children];
    [arr[i], arr[j]] = [arr[j], arr[i]];
    set({ children: arr });
  };
  const addChild = (type) => set({ children: [...children, newBlock(type)] });

  // Auto-sum from nested manpower blocks if useAuto enabled
  const autoSum = children
    .filter(c => c.type === 'manpower')
    .reduce((s, c) => {
      const t = computeManpowerTotal(c);
      return s + (t || 0);
    }, 0);
  const displayedPrice = (!block.price && autoSum > 0) ? formatNum(autoSum) : block.price;

  return (
    <div className="group relative mb-5">
      <BlockTools onDelete={onDelete} onMove={onMove} />

              className="w-4 h-4 rounded-full border-2"
              style={{ background: v, borderColor: block.color === k ? '#000' : 'transparent' }}
              title={k}
            />
          ))}
        </div>
      </div>
      {/* Price row */}
      <div className="ml-5 flex items-baseline gap-2 mb-2 flex-wrap">
        {block.oldPrice && <span className="strike text-[15px]">{block.oldPrice}</span>}
        <EditableText as="span" value={displayedPrice} onChange={(v) => set({ price: v })} className="text-[15px] font-medium" placeholder={autoSum > 0 ? formatNum(autoSum) : '0,00'} />
        <span className="text-[15px] text-gray-600">kr inkl moms</span>
        <button
          onClick={() => {
            if (block.oldPrice) { set({ oldPrice: '' }); }
            else { set({ oldPrice: block.price || '' , price: '' }); }
          }}
          className="no-print text-[10px] text-gray-400 hover:text-gray-700 opacity-0 group-hover:opacity-100 ml-1 border border-gray-200 rounded px-1.5 py-0.5"
          title={block.oldPrice ? 'Usuń przekreśloną cenę' : 'Przekreśl obecną cenę i wpisz nową'}
        >
          {block.oldPrice ? 'cofnij ✕' : 'skreśl cenę'}
        </button>
        {autoSum > 0 && !block.price && (
          <span className="no-print text-[10px] text-gray-400 italic">↑ auto-policzone z MANPOWER</span>
        )}
      </div>
      {/* Nested children blocks */}
      {children.length > 0 && (
        <div className="ml-5 mt-3">
          {children.map(child => (

              key={child.id}
              block={child}
              onChange={(nb) => updateChild(child.id, nb)}

/* ============================================================
   POINT (ETAPP) – numbered circle + title + price + blocks
   ============================================================ */
const Point = ({ point, idx, hasNext, onChange, onDelete, onMove }) => {
  const set = (patch) => onChange({ ...point, ...patch });
  const updateBlock = (id, newBlock) => set({ blocks: point.blocks.map(b => b.id === id ? newBlock : b) });
  const deleteBlock = (id) => set({ blocks: point.blocks.filter(b => b.id !== id) });
  const moveBlock = (id, dir) => {
    const i = point.blocks.findIndex(b => b.id === id);
    const j = i + dir;
    if (j < 0 || j >= point.blocks.length) return;
    const arr = [...point.blocks];
    [arr[i], arr[j]] = [arr[j], arr[i]];
    set({ blocks: arr });
  };
  const addBlock = (type) => set({ blocks: [...point.blocks, newBlock(type)] });

  const circle = (
    <div className="w-10 h-10 rounded-full bg-[#5468E5] text-white flex items-center justify-center font-medium text-[15px] flex-shrink-0">
      {idx + 1}
    </div>
  );
  const hoverTools = (
    <>
      <button onClick={() => onMove(-1)} className="w-7 h-7 rounded bg-white border border-gray-200 hover:bg-gray-50 flex items-center justify-center text-gray-500"><Icon.ArrowUp width="14" height="14"/></button>
      <button onClick={() => onMove(1)} className="w-7 h-7 rounded bg-white border border-gray-200 hover:bg-gray-50 flex items-center justify-center text-gray-500"><Icon.ArrowDown width="14" height="14"/></button>
      <button onClick={onDelete} className="w-7 h-7 rounded bg-white border border-red-200 hover:bg-red-50 flex items-center justify-center text-red-500"><Icon.Trash width="14" height="14"/></button>
    </>
  );

  return (
    <TimelineRow hasNext={hasNext} circle={circle} hoverTools={hoverTools}>
      {/* Title + main price */}
      <EditableText
        as="div"
        value={point.title}
        onChange={(v) => set({ title: v })}
        className="text-[18px] font-bold text-black leading-tight"
        placeholder="Kitchen Renovation"
        multiline
      />
      <div className="text-[15px] mt-0.5 mb-3">
        <EditableText as="span" value={point.mainPrice} onChange={(v) => set({ mainPrice: v })} placeholder="0,00" className="font-medium" />
        <span className="text-gray-600"> kr inkl moms</span>
      </div>
      {point.subtitle && (
        <EditableText as="div" value={point.subtitle} onChange={(v) => set({ subtitle: v })} className="text-[13px] text-gray-600 mt-1 mb-2" multiline placeholder="(opcjonalny podtytuł)" />
      )}

      {/* Nested blocks */}
      <div className="pl-4">
        {point.blocks.map((b) => (
          <Block
            key={b.id}
            block={b}
            onChange={(nb) => updateBlock(b.id, nb)}
            onDelete={() => deleteBlock(b.id)}
            onMove={(dir) => moveBlock(b.id, dir)}
          />
        ))}
        <BlockAdder onAdd={addBlock} />
      </div>
    </TimelineRow>
  );
};

  const updatePoint = (id, p) => setQuote({ ...quote, points: quote.points.map(pt => pt.id === id ? p : pt) });
  const deletePoint = (id) => setQuote({ ...quote, points: quote.points.filter(pt => pt.id !== id) });
  const movePoint = (id, dir) => {
    const i = quote.points.findIndex(pt => pt.id === id);
    const j = i + dir;
    if (j < 0 || j >= quote.points.length) return;
    const arr = [...quote.points];
    [arr[i], arr[j]] = [arr[j], arr[i]];
    setQuote({ ...quote, points: arr });
  };
  const addPoint = () => setQuote({ ...quote, points: [...quote.points, blankPoint(quote.points.length + 1)] });

  // Auto-sum from points' mainPrice
  const computedTotal = quote.points.reduce((s, p) => s + (parseNum(p.mainPrice) || 0), 0);
  const autoTotal = computedTotal > 0 ? formatNum(computedTotal) : '';

  // Determine timeline sequence to know hasNext for each row
  const summaryEnabled = quote.summary.enabled;
  const optionalEnabled = quote.optional.enabled;
  const pointHasNext = (idx) => idx < quote.points.length - 1 || summaryEnabled || optionalEnabled;
  const summaryHasNext = optionalEnabled;

  return (
    <div className="doc-page doc-page-pink">
      <PageFooter num={pageNum} total={totalPages} />
      <QuoteHeader header={quote.header} setHeader={setHeader} />
      <div className="mt-4">
        {quote.points.map((pt, idx) => (
          <Point
            key={pt.id}
            point={pt}
            idx={idx}
            hasNext={pointHasNext(idx)}
            onChange={(p) => updatePoint(pt.id, p)}
            onDelete={() => deletePoint(pt.id)}
            onMove={(dir) => movePoint(pt.id, dir)}
          />
        ))}
        <div className="flex gap-4 mb-4">
          <div className="timeline-col">
            {(summaryEnabled || optionalEnabled) && <div className="timeline-line-fill" style={{ marginTop: 0 }}></div>}
          </div>
          <button onClick={addPoint} className="no-print px-4 py-2 bg-[#6366F1] hover:bg-[#4F46E5] text-white text-sm rounded-lg flex items-center gap-2 self-start">
            <Icon.Plus width="16" height="16"/> Dodaj punkt (ETAPP)
          </button>
        </div>
        <SummarySection summary={quote.summary} setSummary={setSummary} hasNext={summaryHasNext} autoTotal={autoTotal} />
        <OptionalSection optional={quote.optional} setOptional={setOptional} hasNext={false} />
      </div>
    </div>
  );
};

/* ============================================================
   EXPORT TO STANDALONE HTML (for sending to client)
   — embeds all images as base64 data URIs so the file is fully portable
   ============================================================ */
const imgToDataUrl = (src) => new Promise((resolve) => {
  // Try fetch first (works on http(s), often blocked on file://)
  fetch(src).then(r => r.blob()).then(blob => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => resolve(null);
    reader.readAsDataURL(blob);
  }).catch(() => {
    // Fallback: load via <img> + canvas (works for raster; for SVG returns null in file://)
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth || 800;
        canvas.height = img.naturalHeight || 600;
        canvas.getContext('2d').drawImage(img, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      } catch (e) { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = src;
  });
});

const exportQuoteToHTML = async (quote) => {
  const pages = document.querySelectorAll('.doc-page');
  if (pages.length === 0) return;

  // Collect unique image srcs
  const uniqueSrcs = new Set();
  pages.forEach(p => p.querySelectorAll('img').forEach(img => uniqueSrcs.add(img.src)));

  // Resolve each src -> dataUrl
  const srcMap = {};
  let failures = 0;
  for (const src of uniqueSrcs) {
    if (src.startsWith('data:')) { srcMap[src] = src; continue; }
    const dataUrl = await imgToDataUrl(src);
    if (dataUrl) srcMap[src] = dataUrl;
    else { failures++; srcMap[src] = src; }
  }
  if (failures > 0) {
    alert(`Uwaga: nie udalo sie osadzic ${failures} obrazka(ow) w eksportowanym HTML. Otwieraj plik w tej samej lokalizacji co folder "assets/", albo uzyj "Drukuj / PDF" zamiast eksportu HTML.`);
  }

  // Clone each page, strip editor-only stuff, swap img src to data URIs
  const pagesHTML = Array.from(pages).map(p => {
    const clone = p.cloneNode(true);
    clone.querySelectorAll('.no-print').forEach(el => el.remove());
    clone.querySelectorAll('[contenteditable]').forEach(el => {
      el.removeAttribute('contenteditable');
      el.removeAttribute('data-placeholder');
    });
    clone.querySelectorAll('img').forEach(img => {
      const mapped = srcMap[img.src];
      if (mapped) img.setAttribute('src', mapped);
    });
    return clone.outerHTML;
  }).join('\n');

  // Grab our own <style> + Tailwind + fonts
  const sourceStyle = document.querySelector('style')?.innerHTML || '';

  const CLOSE = '<' + '/script>';
  const fullHTML = '<!DOCTYPE html>\n' +
'<html lang="sv">\n' +
'<head>\n' +
'<meta charset="UTF-8" />\n' +
'<meta name="viewport" content="width=device-width, initial-scale=1.0" />\n' +
'<title>BODO Offert · ' + quote.meta.title.replace(/[<>]/g, '') + '</title>\n' +
'<script src="https://cdn.tailwindcss.com">' + CLOSE + '\n' +
'<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">\n' +
'<style>' + sourceStyle + '\n' +
'  body { background: #F3F4F6; padding: 32px 0; }\n' +
'  @media print { body { padding: 0; background: white; } }\n' +
'</style>\n' +
'</head>\n' +
'<body>\n' +
pagesHTML + '\n' +
'</body>\n' +
'</html>';

  const blob = new Blob([fullHTML], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `BODO-offert-${quote.meta.slug}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
};

/* Continuous PDF — renders each page to canvas, stacks into ONE long PDF, downloads immediately */
const printContinuousPDF = async (quote) => {
  if (typeof html2pdf === 'undefined') {
    alert('html2pdf nie zaladowane. Sprawdz polaczenie internetowe (potrzebne dla CDN).');
    return;
  }
  const pages = document.querySelectorAll('.doc-page');
  if (pages.length === 0) return;

  // Loading overlay so user sees feedback while html2pdf renders
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Montserrat, system-ui, sans-serif;';
  overlay.innerHTML = '<div style="width: 40px; height: 40px; border: 4px solid #E5E7EB; border-top-color: #2A3978; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>' +
                      '<div style="margin-top: 16px; font-size: 15px; color: #2A3978; font-weight: 600;">Generuję PDF…</div>' +
                      '<div style="margin-top: 6px; font-size: 12px; color: #6B7280;">to chwilę potrwa, nie zamykaj okna</div>' +
                      '<style>@keyframes spin { to { transform: rotate(360deg); } }</style>';
  document.body.appendChild(overlay);

  // Container VISIBLE (so html2canvas can actually render it!) but hidden under overlay
  const container = document.createElement('div');
  container.className = 'pdf-export-container';
  container.style.cssText = 'position: fixed; top: 0; left: 0; width: 210mm; background: white; z-index: 999998; pointer-events: none;';
  // Inject scoped CSS to KILL any pink borders and stripes from cloned pages
  const styleReset = document.createElement('style');
  styleReset.textContent = '.pdf-export-container .doc-page { border: 0 !important; box-shadow: none !important; margin: 0 !important; min-height: 0 !important; max-height: none !important; page-break-after: avoid !important; break-after: avoid !important; } .pdf-export-container .doc-page::before, .pdf-export-container .doc-page::after { display: none !important; content: none !important; }';
  container.appendChild(styleReset);

  pages.forEach((p, i) => {
    const c = p.cloneNode(true);
    c.querySelectorAll('.no-print').forEach(el => el.remove());
    c.querySelectorAll('[contenteditable]').forEach(el => {
      el.removeAttribute('contenteditable');
      el.removeAttribute('data-placeholder');
    });
    c.classList.remove('doc-page-pink');
    // For Cover (first page) preserve gray bg; for others white bg
    const isCover = i === 0;
    c.style.cssText = (c.style.cssText || '') +
      '; border: 0 !important; border-top: 0 !important; box-shadow: none !important;' +
      ' margin: 0 !important; min-height: 0 !important; max-height: none !important;' +
      ' page-break-after: avoid !important; break-after: avoid !important;' +
      ' width: 210mm !important;' +
      (isCover ? ' background: rgb(158, 171, 186) !important;' : ' background: white !important;');
    container.appendChild(c);
  });
  document.body.appendChild(container);

  try {
    // Wait for fonts + images to load before snapshot
    if (document.fonts && document.fonts.ready) { await document.fonts.ready; }
    const imgs = container.querySelectorAll('img');
    await Promise.all(Array.from(imgs).map(img =>
      img.complete && img.naturalWidth > 0
        ? Promise.resolve()
        : new Promise(r => { img.onload = img.onerror = r; setTimeout(r, 2500); })
    ));
    await new Promise(r => setTimeout(r, 400));

    // Measure total height -> one long page (210mm wide, height = total)
    const totalHeightPx = container.offsetHeight;
    const totalHeightMm = Math.max(297, Math.ceil(totalHeightPx * 0.2645833));
    const safeTitle = (quote.meta.title || 'wycena').replace(/[^a-zA-Z0-9-_]/g, '_').slice(0, 80);

    await html2pdf().set({
      margin: 0,
      filename: 'BODO-' + safeTitle + '-ciagly.pdf',
      image: { type: 'jpeg', quality: 0.92 },
      html2canvas: { scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#ffffff', logging: false, windowWidth: container.offsetWidth },
      jsPDF: { unit: 'mm', format: [210, totalHeightMm], orientation: 'portrait' },
      pagebreak: { mode: ['avoid-all'] },
    }).from(container).save();
  } catch (e) {
    console.error('PDF error:', e);
    alert('Blad generowania PDF: ' + (e.message || e) + '\n\nAlternatywa: kliknij "Drukuj A4" → Chrome -> Zapisz jako PDF, albo "HTML" zeby wyslac plik HTML.');
  } finally {
    document.body.removeChild(container);
  }
};

/* ============================================================
   ROOT APP
   ============================================================ */
const App = () => {
  const [quotes, setQuotes] = useState(() => loadAll());
  const [currentSlug, setCurrentSlug] = useState(() => getQuoteFromURL());
  const [savedAt, setSavedAt] = useState(null);
  // Undo / Redo history (per-slug, in-memory only, max 30 steps)
  const historyRef = useRef({});  // { slug: { past: [], future: [] } }
  const [, forceUpdate] = useState(0);
  const pushHistory = (slug, oldQuote) => {
    if (!historyRef.current[slug]) historyRef.current[slug] = { past: [], future: [] };
    historyRef.current[slug].past.push(JSON.stringify(oldQuote));
    if (historyRef.current[slug].past.length > 30) historyRef.current[slug].past.shift();
    historyRef.current[slug].future = []; // new edit clears redo stack
  };
  const undo = () => {
    if (!currentSlug) return;
    const h = historyRef.current[currentSlug];
    if (!h || h.past.length === 0) return;
    const prev = JSON.parse(h.past.pop());
    h.future.push(JSON.stringify(quotes[currentSlug]));
    setQuotes({ ...quotes, [currentSlug]: prev });
    forceUpdate(x => x + 1);
  };
  const redo = () => {
    if (!currentSlug) return;
    const h = historyRef.current[currentSlug];
    if (!h || h.future.length === 0) return;
    const next = JSON.parse(h.future.pop());
    h.past.push(JSON.stringify(quotes[currentSlug]));
    setQuotes({ ...quotes, [currentSlug]: next });
    forceUpdate(x => x + 1);
  };
  // Keyboard shortcuts
  useEffect(() => {
    const onKey = (e) => {
      const meta = e.metaKey || e.ctrlKey;
      if (meta && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
      else if (meta && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  });

  // Auto-save on quotes change
  useEffect(() => { saveAll(quotes); }, [quotes]);

  // Make sure URL matches current
  useEffect(() => { setQuoteInURL(currentSlug); }, [currentSlug]);

  // If URL has a quote but it doesn't exist, clear
  useEffect(() => {
    if (currentSlug && !quotes[currentSlug]) setCurrentSlug(null);
  }, [currentSlug, quotes]);

  const quote = currentSlug ? quotes[currentSlug] : null;

  const newQuote = () => {
    const title = prompt('Tytuł nowej wyceny (np. „Adam XYZ – Renovering"):', 'Nowa wycena');
    if (title === null) return;
    let slug = slugify(title);
    if (quotes[slug]) slug = slug + '-' + Date.now().toString(36).slice(-4);
    const q = blankQuote(slug, title);
    setQuotes({ ...quotes, [slug]: q });
    setCurrentSlug(slug);
  };

  const duplicateQuote = (slug) => {
    const src = quotes[slug];
    if (!src) return;
    const newTitle = src.meta.title + ' (kopia)';
    let newSlug = slugify(newTitle);
    if (quotes[newSlug]) newSlug = newSlug + '-' + Date.now().toString(36).slice(-4);
    const copy = JSON.parse(JSON.stringify(src));
    copy.meta = { ...copy.meta, slug: newSlug, title: newTitle, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    setQuotes({ ...quotes, [newSlug]: copy });
    setCurrentSlug(newSlug);
  };

  const deleteQuote = (slug) => {
    if (!confirm(`Usunąć wycenę „${quotes[slug]?.meta.title}"?`)) return;
    const next = { ...quotes };
    delete next[slug];
    setQuotes(next);
    if (currentSlug === slug) setCurrentSlug(null);
  };

  const updateQuote = (next) => {
    const prev = quotes[next.meta.slug];
    if (prev) pushHistory(next.meta.slug, prev);
    next.meta.updatedAt = new Date().toISOString();
    setQuotes({ ...quotes, [next.meta.slug]: next });
    setSavedAt(new Date().toLocaleTimeString().slice(0, 5));
  };

  const canUndo = currentSlug && historyRef.current[currentSlug] && historyRef.current[currentSlug].past.length > 0;
  const canRedo = currentSlug && historyRef.current[currentSlug] && historyRef.current[currentSlug].future.length > 0;

  /* Export all quotes to a JSON file */
  const exportAll = () => {
    const blob = new Blob([JSON.stringify(quotes, null, 2)], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `bodo-quotes-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  /* Import quotes from a JSON file (merges with existing, ignores duplicate slugs unless confirmed) */
  const importAll = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (typeof data !== 'object' || data === null) throw new Error('Nieprawidlowy plik JSON');
        const existingSlugs = Object.keys(quotes);
        const importedSlugs = Object.keys(data);
        const overlapping = importedSlugs.filter(s => existingSlugs.includes(s));
        let merged = { ...quotes };
        if (overlapping.length > 0) {
          if (!confirm(`Znaleziono ${overlapping.length} wycen o tych samych nazwach. Nadpisac istniejace?\n\n${overlapping.join(', ')}`)) {
            // skip overlapping
            for (const s of importedSlugs) if (!existingSlugs.includes(s)) merged[s] = data[s];
          } else {
            merged = { ...merged, ...data };
          }
        } else {
          merged = { ...merged, ...data };
        }
        setQuotes(merged);
        alert(`Zaimportowano ${importedSlugs.length} wycen.`);
      } catch (err) {
        alert('Blad importu: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = ''; // reset input
  };

  const setQuoteTitle = (t) => updateQuote({ ...quote, meta: { ...quote.meta, title: t } });

  const togglePage = (key, val) => updateQuote({ ...quote, [key]: { ...quote[key], enabled: val } });

  return (
    <div className="flex min-h-screen">
      <Sidebar
        quotes={quotes}
        currentSlug={currentSlug}
        onSelect={setCurrentSlug}
        onNew={newQuote}
        onDelete={deleteQuote}
        onDuplicate={duplicateQuote}
        onTogglePage={togglePage}
        onExportAll={exportAll}
        onImportAll={importAll}
        quote={quote}
      />
      <main className="flex-1 min-w-0">
        {!quote && (
          <div className="flex flex-col items-center justify-center min-h-screen text-center px-6">
            <BodoLogo size="lg" className="mb-6" />
            <h1 className="text-2xl font-bold text-[#2A3978] mb-2">Offert Generator</h1>
            <p className="text-gray-500 mb-8 max-w-md">Lokalna aplikacja do tworzenia wycen w stylu BODO. Wszystko zapisane w przeglądarce (localStorage). Każda wycena ma swój URL — możesz wpisać <code className="bg-gray-100 px-1.5 py-0.5 rounded text-[12px]">?quote=nazwa</code> w adresie.</p>
            <button onClick={newQuote} className="px-6 py-3 bg-[#6366F1] hover:bg-[#4F46E5] text-white font-medium rounded-lg flex items-center gap-2">
              <Icon.Plus width="16" height="16"/> Stwórz pierwszą wycenę
            </button>
          </div>
        )}
        {quote && (() => {
          // Compute total pages dynamically based on enabled sections
          const total =
            1 /* cover */ +
            1 /* main quote */ +
            (quote.otherCosts.enabled ? 1 : 0) +
            (quote.values.enabled ? 1 : 0) +
            (quote.terms.enabled ? 1 : 0);
          let n = 0;
          const next = () => ++n;
          return (
            <>
              <TopBar quote={quote} onTitleChange={setQuoteTitle} savedAt={savedAt} onUndo={undo} onRedo={redo} canUndo={canUndo} canRedo={canRedo} />
              <div className="py-8 px-4 bg-gray-100 min-h-screen">
                <CoverPage pageNum={next()} totalPages={total} />
                <QuotePage quote={quote} setQuote={updateQuote} pageNum={next()} totalPages={total} />
                {quote.otherCosts.enabled && (
                  <OtherCostsPage
                    otherCosts={quote.otherCosts}
                    setOtherCosts={(oc) => updateQuote({ ...quote, otherCosts: oc })}
                    header={quote.header}
                    pageNum={next()}
                    totalPages={total}
                  />
                )}
                {quote.values.enabled && <ValuesPage pageNum={next()} totalPages={total} />}
                {quote.terms.enabled && <TermsPage header={quote.header} terms={quote.terms} pageNum={next()} totalPages={total} />}
              </div>
            </>
          );
        })()}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
